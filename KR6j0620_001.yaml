body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯爾時佛告諸苾芻汝等諦聽我今宣說無畏陀羅尼是陀羅尼能與衆生息除諸難苾芻若人得聞及受持者是人所獲功德無量無邊即說陀羅尼曰唵引那莫阿引哩也二合引嚩路吉帝引說囉引野一句地薩埵引野二摩賀引薩埵引野三摩賀引迦引嚕尼迦引野四怛𭔞切身下同他引唵引目訖帝二合引五蘇目訖帝二合引六砌引那儞七尾砌引那儞八儞哩摩二合梨引九莽誐梨引十蘇莽誐梨引十一蘇目契引十二尾目契引十三薩哩嚩二合跋野尾謨引叉尼引十四薩哩嚩二合跋踰引鉢捺囉二合吠引毗藥二合尾謨引叉尼引十五囉惹跋煬十六陬囉跋煬十七摩囉拏跋煬十八阿必哩二合野跋煬十九設薩怛囉三合跋煬二十阿屹儞二合跋煬二十一烏那哥跋煬二十二尾沙跋煬二十三波囉作訖囉二合跋煬二十四賽𭔞跋煬二十五設咄嚕二合跋煬二十六阿設儞跋煬二十七賽那末𬽓誐都引嚩引二十八陬囉末𬽓誐都引嚩引二十九星賀末𬽓誐都引嚩引三十咩引竭囉二合末𬽓誐都引嚩引三十一藥叉末𬽓誐都引嚩引三十二捺微二合波末𬽓誐都引嚩引三十三贊拏末𬽓誐都引嚩引三十四訖哩二合瑟拏二合薩哩波二合末𬽓誐都引嚩引三十五阿惹哥囉末𬽓誐都引嚩引三十六喝悉底二合末𬽓誐都引嚩引三十七三母捺囉二合末𬽓誐都引嚩引三十八哥引羅播引設末𬽓誐都引嚩引三十九儞誐拏滿馱都引嚩引四十哥引瑟吒二合滿馱都引嚩四十一拶哩摩二合滿馱都引嚩引四十二尾沙訖囉二合蜜都引嚩引四十三訥哩僻二合叉都引嚩引四十四儞誐拏滿馱都引嚩引四十五波囉設娑怛囉三合都引嚩引四十六薩哩嚩二合引𭔞乃嚩跋曳數四十七薩哩巫二合引鉢捺囉二合微引數沒節帝引四十八薩哩嚩二合跋野沒節帝引四十九𡁆叉𡁆叉摩摩薩哩嚩二合薩埵喃引五十阿引喻囉引嚕引倪五十一室哩二合煬嚩哩馱二合底五十二阿引哩也二合引嚩路引吉帝引說囉寫五十三渴帝引尾喝帝引五十四喝麗引尾喝麗引五十五薩哩微二合引鉢囉二合引爹哩體二合哥引謨引左儞五十六謨引叉尼五十七尾引哩也二合尼唵那莫莎引賀引五十八爾時世尊說是陀羅尼已復告諸苾芻言若善男子善女人聞此陀羅尼發志誠心恭信供養讀誦受持若自手書若使人書及為他說廣宣流布是人不為王難水火難刀兵難冤賊難之所傷害又復不為夜叉難禁縛難雷雹難閃電難大海漂沒難蟒蛇毒螫難師子狂象難猛虎惡獸難飢饉疾疫難如是諸難皆不為害乃至怖畏悉皆解脫爾時諸苾芻衆聞佛所說歡喜信受作禮而退
